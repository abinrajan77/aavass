services:
  postgres:
    image: postgres:16
    container_name: aavaas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aavaas
      POSTGRES_USER: aavaas
      POSTGRES_PASSWORD: aavaas
    ports:
      - "5432:5432"
    volumes:
      - aavaas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aavaas -d aavaas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aavaas_postgres_data:
